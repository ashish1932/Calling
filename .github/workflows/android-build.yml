name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Generate Gradle Wrapper
      working-directory: ./tele-counseling
      run: gradle wrapper --gradle-version 8.7

    - name: Grant execute permission for gradlew
      working-directory: ./tele-counseling
      run: chmod +x gradlew

    - name: Build debug APK
      working-directory: ./tele-counseling
      run: ./gradlew clean assembleDebug --no-daemon --no-build-cache --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: counselflow-unified-apk
        path: tele-counseling/app/build/outputs/apk/debug/*.apk
