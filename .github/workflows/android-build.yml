name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 'current'

    - name: Build Patient App
      run: |
        cd tele-counseling
        gradle assembleDebug

    - name: Build Counselor App
      run: |
        cd counselor-app
        gradle assembleDebug

    - name: Upload APKs
      uses: actions/upload-artifact@v3
      with:
        name: android-apks
        path: |
          tele-counseling/app/build/outputs/apk/debug/*.apk
          counselor-app/app/build/outputs/apk/debug/*.apk
