name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # BUILD PATIENT APP
    - name: Generate Gradle Wrapper (Patient App)
      working-directory: ./tele-counseling
      run: gradle wrapper

    - name: Grant execute permission for gradlew (Patient App)
      working-directory: ./tele-counseling
      run: chmod +x gradlew

    - name: Build debug APK (Patient App)
      working-directory: ./tele-counseling
      run: ./gradlew assembleDebug

    - name: Upload Patient APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PatientApp-APK
        path: tele-counseling/app/build/outputs/apk/debug/app-debug.apk

    # BUILD COUNSELOR APP
    - name: Generate Gradle Wrapper (Counselor App)
      working-directory: ./counselor-app
      run: gradle wrapper

    - name: Grant execute permission for gradlew (Counselor App)
      working-directory: ./counselor-app
      run: chmod +x gradlew

    - name: Build debug APK (Counselor App)
      working-directory: ./counselor-app
      run: ./gradlew assembleDebug

    - name: Upload Counselor APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CounselorApp-APK
        path: counselor-app/app/build/outputs/apk/debug/app-debug.apk
