name: Deploy Web App

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - 'patient-mobile-app/**'
      - '.github/workflows/eas-build.yml'
  workflow_dispatch:
    inputs:
      vm_host:
        description: 'Target VM Host/IP'
        required: false
        type: string
        default: '192.168.1.55'
      vm_user:
        description: 'Target VM SSH User'
        required: false
        type: string
        default: 'cubeai'

env:
  VM_HOST: ${{ github.event.inputs.vm_host || secrets.VM_HOST || '192.168.1.55' }}
  VM_USER: ${{ github.event.inputs.vm_user || secrets.VM_USER || 'cubeai' }}
  VM_APP_DIR: ${{ secrets.VM_APP_DIR || '/home/cubeai/punjab-voice-app' }}
  BACKEND_IMAGE: casdevops/punjab-voice-backend
  FRONTEND_IMAGE: casdevops/punjab-voice-frontend

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
          tags: ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
          tags: ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify build output without credentials
        if: ${{ env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN == '' }}
        run: |
          echo "⚠️ Docker Hub credentials not configured. Built images locally for verification but skipped push."

  deploy:
    name: Deploy to Proxmox VM
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch') }}
    env:
      VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH Key
        if: ${{ env.VM_SSH_KEY != '' }}
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.VM_SSH_KEY }}
          known_hosts: 'unsupported'
          if_key_exists: replace

      - name: Rsync project files to VM
        if: ${{ env.VM_SSH_KEY != '' }}
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='server/node_modules' \
            --exclude='*.log' \
            ./ ${{ env.VM_USER }}@${{ env.VM_HOST }}:${{ env.VM_APP_DIR }}/

      - name: Deploy and check services via SSH
        if: ${{ env.VM_SSH_KEY != '' }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          NGROK_URL: ${{ secrets.NGROK_URL }}
        run: |
          ssh -o StrictHostKeyChecking=no ${{ env.VM_USER }}@${{ env.VM_HOST }} "VM_APP_DIR='${{ env.VM_APP_DIR }}' DOCKERHUB_USER='${{ env.DOCKERHUB_USERNAME }}' DOCKERHUB_PASSWORD='${{ env.DOCKERHUB_TOKEN }}' NGROK_URL='${{ env.NGROK_URL }}' CLOUDFLARE_TUNNEL_TOKEN='${{ env.CLOUDFLARE_TUNNEL_TOKEN }}' bash -s" <<'EOF'
            set -e
            mkdir -p "$VM_APP_DIR"
            cd "$VM_APP_DIR"

            if command -v sudo >/dev/null 2>&1; then
              sudo -n systemctl enable --now docker >/dev/null 2>&1 || true
            fi

            if ! docker info >/dev/null 2>&1; then
              echo 'Docker daemon is not available on the VM.'
              exit 1
            fi

            COMPOSE_CMD='docker compose'
            if ! docker compose version >/dev/null 2>&1; then
              if command -v docker-compose >/dev/null 2>&1; then
                COMPOSE_CMD='docker-compose'
              else
                echo 'Neither docker compose nor docker-compose is available on the VM.'
                exit 1
              fi
            fi

            if [ -n "$DOCKERHUB_USER" ] && [ -n "$DOCKERHUB_PASSWORD" ]; then
              echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USER" --password-stdin
            fi

            if [ ! -f .env ]; then
              touch .env
            fi

            grep -v '^NGROK_URL=' .env | grep -v '^CLOUDFLARE_TUNNEL_TOKEN=' 2>/dev/null > .env.tmp || true
            mv .env.tmp .env

            if [ -n "$NGROK_URL" ]; then
              printf '%s\n' "NGROK_URL=$NGROK_URL" >> .env
            fi
            if [ -n "$CLOUDFLARE_TUNNEL_TOKEN" ]; then
              printf '%s\n' "CLOUDFLARE_TUNNEL_TOKEN=$CLOUDFLARE_TUNNEL_TOKEN" >> .env
            fi

            echo 'Stopping current stack...'
            $COMPOSE_CMD down --remove-orphans || true
            docker rm -f punjab-voiceai_cloudflared 2>/dev/null || true
            docker image prune -f -a --filter 'until=24h' || true

            echo 'Pulling latest images...'
            $COMPOSE_CMD pull || echo 'Pull failed, using local images'

            echo 'Starting services...'
            $COMPOSE_CMD up -d --force-recreate

            sleep 10
            docker ps -a

            FRONTEND_STATUS=$(docker inspect -f '{{.State.Running}}' punjab-voiceai_frontend 2>/dev/null || echo 'false')
            if [ "$FRONTEND_STATUS" != 'true' ]; then
              echo 'Frontend container failed to start. Logs:'
              docker logs punjab-voiceai_frontend | tail -n 20 || true
              exit 1
            fi

            BACKEND_STATUS=$(docker inspect -f '{{.State.Running}}' punjab-voiceai_backend 2>/dev/null || echo 'false')
            if [ "$BACKEND_STATUS" != 'true' ]; then
              echo 'Backend container failed to start. Logs:'
              docker logs punjab-voiceai_backend | tail -n 20 || true
              exit 1
            fi

            echo 'Checking MongoDB connection...'
            DB_STATUS='FAIL'
            for i in $(seq 1 6); do
              DB_CHECK=$(docker exec punjab-voiceai_backend node -e "
                const mongoose = require('mongoose');
                const uri = process.env.MONGODB_URI || 'mongodb://mongodb:27017/punjabvoice';
                mongoose.connect(uri, { serverSelectionTimeoutMS: 2000 })
                  .then(() => { console.log('OK'); mongoose.disconnect(); })
                  .catch(() => { console.log('FAIL'); });
              " 2>/dev/null || echo 'FAIL')
              if [ "$DB_CHECK" = 'OK' ]; then
                DB_STATUS='OK'
                echo 'MongoDB is connected!'
                break
              fi
              echo "Attempt $i: MongoDB not ready, waiting..."
              sleep 5
            done

            if [ "$DB_STATUS" != 'OK' ]; then
              echo 'Database connection failed!'
              exit 1
            fi

            echo 'Deployment completed successfully!'
          EOF

      - name: Warn if SSH not configured
        if: ${{ env.VM_SSH_KEY == '' }}
        run: |
          echo "⚠️ secrets.VM_SSH_KEY is not defined. Skipping deployment to target VM."
