name: Build Android APK (Local Runner)

on:
  push:
    branches: [ "main", "master", "counceling-flow" ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: patient-mobile-app/package-lock.json

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install Dependencies
        working-directory: ./patient-mobile-app
        run: npm ci

      - name: Run Expo Prebuild
        working-directory: ./patient-mobile-app
        run: npx expo prebuild --platform android --clean

      - name: Build Android Release APK
        working-directory: ./patient-mobile-app/android
        run: ./gradlew assembleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: patient-mobile-app/android/app/build/outputs/apk/release/app-release.apk
