

services:
  mongodb:
    image: mongo:6-jammy
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 15s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: casdevops/punjab-voice-backend:latest
    container_name: punjab-voiceai_backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      - PORT=5001
      - MONGODB_URI=mongodb://mongodb:27017/punjabvoice

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: casdevops/punjab-voice-frontend:latest
    container_name: punjab-voiceai_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - PORT=3001
      - BACKEND_HOST=backend
      - BACKEND_PORT=5001
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    container_name: punjab-voiceai_nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2-alpine
    container_name: punjab-voiceai_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "3001:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: punjab-voiceai_cloudflared
    restart: unless-stopped
    depends_on:
      caddy:
        condition: service_healthy
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  mongodb_data:
